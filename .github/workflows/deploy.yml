name: Deploy Frontend

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: hbd0214/234-deploylab-frontend:latest

      - name: Save Docker image to tar
        run: |
          docker pull hbd0214/234-deploylab-frontend:latest
          docker save hbd0214/234-deploylab-frontend:latest -o frontend-image.tar
          chmod 666 frontend-image.tar

      - name: Copy image and docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST_SERVER }}
          username: root
          key: ${{ secrets.HOST_SSH_PRIVATE_KEY }}
          source: "frontend-image.tar,docker-compose.yml"
          target: "/root/frontend"

      - name: Load image and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST_SERVER }}
          username: root
          key: ${{ secrets.HOST_SSH_PRIVATE_KEY }}
          script: |
            cd /root/frontend
            docker load -i frontend-image.tar
            docker compose down || true
            docker compose up -d --no-pull
            rm -f frontend-image.tar